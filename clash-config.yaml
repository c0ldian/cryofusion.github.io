# ======================
# 4. 重写规则（对应 rewrite_local + rewrite_remote）
# ======================
# 可放入独立 rewrite.yaml，通过 rule-providers 引用
# 这里使用内联方式（Clash 直接支持）
rules:
  # URL 重写示例（Google CN 跳转）
  - URL-REGEX,^https?://(www\.)?google\.cn,302://www.google.com

# ======================
# 5. 其他配置
# ======================
dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
    - 223.5.5.5
    - 8.8.8.8
  nameserver:
    - 223.5.5.5
    - 8.8.8.8
  fallback:
    - 8.8.4.4
  attack-prepend-ip:
    - 119.29.29.29
  attack-threshold: 5

# 实验性功能
experimental:
  ignore-resolve-fail: true

# 日志
log-level: info
external-controller: 127.0.0.1:51101
secret: ""

