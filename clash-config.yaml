# Clash 配置文件（由 Quantumult X 转换）
# 来源：Orz-3 小白配置
# 转换日期：2026-03-02

# ======================
# 1. 代理节点（从 server_remote 订阅获取）
# ======================
# 注意：由于订阅 URL 需要动态获取，这里列出的是你配置中的标签分类
# 实际使用时可配合 Sub-Store 或 Clash 订阅转换工具

proxy-providers:
  yiyo26:
    type: http
    url: https://suc.yiyodns.xyz/sub?target=quanx&url=https%3A%2F%2Fyiyosub.com%2Flink%2FnKETAPYuLE21iScN%3Fsub%3D1%26extend%3D1&insert=false&config=https%3A%2F%2Fcdn.jsdelivr.net%2Fgh%2Fwyawwawy%2FRules%2Frule.ini&emoji=true&list=true&tfo=false&scv=true&fdn=false&sort=false
    interval: 86400
    path: ./profiles/yiyo26.yml
    filter: '.'

  zju1:
    type: http
    url: https://acsub.kyapi.xyz/sub/quantumultx?s=272385&t=JlliqcHEcHC7
    interval: 86400
    path: ./profiles/zju1.yml
    filter: '.'

# 如果订阅返回的是 Quantumult X 格式，需要先转换为 Clash 格式
# 建议使用：https://substore.vercel.app/ 或 https://acl4ssr-sub.github.io/

# 临时占位节点（实际由订阅填充）
proxies: []  # 由 provider 自动填充

# ======================
# 2. 代理组（对应 policy 静态策略）
# ======================
proxy-groups:
  # 全局加速（默认选择）
  - name: "全球加速"
    type: select
    use:
      - yiyo26
      - zju1
    proxies:
      - "DIRECT"
      - "REJECT"

  # 地区专用策略组
  - name: "香港节点"
    type: select
    proxies:
      - "DIRECT"

  - name: "台湾节点"
    type: select
    proxies:
      - "DIRECT"

  - name: "日本节点"
    type: select
    proxies:
      - "DIRECT"

  - name: "韩国节点"
    type: select
    proxies:
      - "DIRECT"

  - name: "狮城节点"
    type: select
    proxies:
      - "DIRECT"

  - name: "美国节点"
    type: select
    proxies:
      - "DIRECT"

  - name: "特殊节点"
    type: select
    proxies:
      - "DIRECT"

  # 功能策略组
  - name: "苹果服务"
    type: select
    proxies:
      - "DIRECT"

  - name: "港台番剧"
    type: select
    proxies:
      - "DIRECT"

  - name: "国际媒体"
    type: select
    proxies:
      - "DIRECT"

  - name: "电报代理"
    type: select
    proxies:
      - "DIRECT"

  - name: "黑白名单"
    type: select
    proxies:
      - "DIRECT"

  # 故障转移与负载均衡
  - name: "自动测速"
    type: url-test
    use:
      - yiyo26
      - zju1
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 0

